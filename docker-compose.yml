services:
  postgres:
    image: postgres:18
    container_name: belsani_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: belsani
      POSTGRES_PASSWORD: belsani_secret
      POSTGRES_DB: belsani_oltp
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      # Persistent data volume — survives container restarts
      - /home/alex/demand_forecasting_optimasation-inventory/postgres_data:/var/lib/postgresql/data
      # Init scripts — run once on first startup, in alphabetical order
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U belsani -d belsani_oltp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
